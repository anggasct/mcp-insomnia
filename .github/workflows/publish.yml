name: Publish to NPM

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  id-token: write 
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm audit
      - run: npm run lint
      - run: npm run lint:eslint
      - run: npm run build
      - run: npm publish --provenance
